<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IL-Trade Journal PRO+</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  background:#0b0f14;
  color:#e6edf3;
  font-family:Arial;
  padding:10px;
}

.card {
  background:#161b22;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

input, select, textarea {
  width:100%;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  border:none;
}

button {
  padding:6px;
  margin-top:5px;
  background:#238636;
  color:white;
  border:none;
  border-radius:6px;
}

.profit { color:#3fb950; }
.loss { color:#f85149; }
</style>
</head>

<body>

<h2>📊 IL-Trading Journal PRO+</h2>

<div class="card">

<input id="date" type="date">
<input id="time" type="time">

<select id="side">
  <option value="LONG">LONG</option>
  <option value="SHORT">SHORT</option>
</select>

<input id="asset" placeholder="Актив">

<input id="deposit" placeholder="Депозит ($)">
<input id="riskPercent" placeholder="Риск %">

<input id="entry" placeholder="Вход">
<input id="stop" placeholder="Стоп">

<h4>Частичный выход 1</h4>
<input id="tp1_price" placeholder="Цена">
<input id="tp1_percent" placeholder="%">

<h4>Частичный выход 2</h4>
<input id="tp2_price" placeholder="Цена">
<input id="tp2_percent" placeholder="%">

<input id="bplus" placeholder="Б+ ($)">
<textarea id="note" placeholder="Комментарий"></textarea>

<button onclick="saveTrade()">Сохранить</button>

</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let trades = JSON.parse(localStorage.getItem("trades") || "[]");
let editId = null;

function calcTrade(t) {

  let risk$ = t.deposit * (t.riskPercent / 100);

  let priceDiff = Math.abs(t.entry - t.stop);
  let position = risk$ / (priceDiff / t.entry);

  let leverage = position / t.deposit;

  function pnlCalc(price, percent) {
    let size = (position / t.entry) * (percent / 100);

    if (t.side === "LONG") {
      return (price - t.entry) * size;
    } else {
      return (t.entry - price) * size;
    }
  }

  let pnl1 = pnlCalc(t.tp1_price, t.tp1_percent);
  let pnl2 = pnlCalc(t.tp2_price, t.tp2_percent);

  let total = pnl1 + pnl2;
  let rr = risk$ ? total / risk$ : 0;

  t.position = position;
  t.leverage = leverage;
  t.risk$ = risk$;
  t.pnl = total;
  t.pnl1 = pnl1;
  t.pnl2 = pnl2;
  t.rr = rr;
}

function saveTrade() {
  let t = {
    id: editId || Date.now(),
    date: date.value,
    time: time.value,
    side: side.value,
    asset: asset.value,
    deposit: +deposit.value,
    riskPercent: +riskPercent.value,
    entry: +entry.value,
    stop: +stop.value,
    tp1_price: +tp1_price.value,
    tp1_percent: +tp1_percent.value,
    tp2_price: +tp2_price.value,
    tp2_percent: +tp2_percent.value,
    bplus: +bplus.value,
    note: note.value
  };

  calcTrade(t);

  if (editId) {
    trades = trades.map(x => x.id === editId ? t : x);
    editId = null;
  } else {
    trades.push(t);
  }

  localStorage.setItem("trades", JSON.stringify(trades));
  render();
}

function editTrade(id) {
  let t = trades.find(x => x.id === id);

  Object.keys(t).forEach(k => {
    if (document.getElementById(k)) {
      document.getElementById(k).value = t[k];
    }
  });

  editId = id;
}

function deleteTrade(id) {
  trades = trades.filter(x => x.id !== id);
  localStorage.setItem("trades", JSON.stringify(trades));
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  [...trades].reverse().forEach(t => {
    list.innerHTML += `
      <div class="card">

        <b>${t.date} \\ ${t.time}</b><br>

        ${t.side} ${t.asset}<br>

        Позиция: ${t.position.toFixed(0)}$ (x${t.leverage.toFixed(1)})<br>

        Вход ${t.entry} | Стоп ${t.stop}<br>

        Риск: ${t.risk$.toFixed(2)}$<br>

        TP1: ${t.tp1_price} (${t.tp1_percent}%) = ${t.pnl1.toFixed(2)}$<br>
        TP2: ${t.tp2_price} (${t.tp2_percent}%) = ${t.pnl2.toFixed(2)}$<br>

        RR: 1:${t.rr.toFixed(2)}<br>

        Прибыль: <span class="${t.pnl>=0?'profit':'loss'}">${t.pnl.toFixed(2)}$</span><br>

        Б+: ${t.bplus}$<br>

        <i>${t.note}</i><br>

        <button onclick="editTrade(${t.id})">✏️</button>
        <button onclick="deleteTrade(${t.id})">🗑</button>

      </div>
    `;
  });
}

render();
</script>

</body>
</html>
