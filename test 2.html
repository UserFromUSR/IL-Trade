<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0b0f14; color: #e6edf3; font-family: Arial; padding: 20px; font-size: 15px; }
h2 { margin-bottom: 16px; font-size: 17px; }
.row { padding: 10px 12px; margin-bottom: 6px; background: #161b22; border-radius: 8px; display: flex; gap: 10px; align-items: center; font-size: 14px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #484f58; flex-shrink: 0; }
.ok   { background: #3fb950; }
.fail { background: #f85149; }
.wait { background: #e3b341; animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
#log { margin-top: 14px; background: #161b22; border-radius: 8px; padding: 12px; font-size: 12px; line-height: 2; word-break: break-all; }
.g { color: #3fb950; } .r { color: #f85149; } .b { color: #58a6ff; }
button { margin-top: 12px; width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<h2>🔥 Firebase Test v2</h2>

<div class="row"><div class="dot wait" id="d1"></div><span id="t1">Firebase SDK</span></div>
<div class="row"><div class="dot" id="d2"></div><span id="t2">Auth Anonymous</span></div>
<div class="row"><div class="dot" id="d3"></div><span id="t3">Запись в БД</span></div>
<div class="row"><div class="dot" id="d4"></div><span id="t4">Чтение из БД</span></div>
<div class="row"><div class="dot" id="d5"></div><span id="t5">Итог</span></div>

<div id="log"></div>
<button onclick="location.reload()">🔄 Повторить</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const L = document.getElementById('log');
const log = (msg, cls) => { L.innerHTML += '<span class="'+(cls||'')+'">'+msg+'</span><br>'; };
const S = (n, state, msg) => {
  document.getElementById('d'+n).className = 'dot '+state;
  document.getElementById('t'+n).textContent = (state==='ok'?'✅ ':state==='fail'?'❌ ':'⏳ ')+msg;
};

(async () => {
  // 1. SDK
  if (typeof firebase === 'undefined') { S(1,'fail','SDK не загружен'); log('Нет интернета','r'); return; }
  S(1,'ok','SDK загружен');
  log('✅ SDK OK','g');

  // Init
  try {
    firebase.initializeApp({
      apiKey:            "AIzaSyBAZJPfxqE2JQ3ya_oDY50mUSIZwcx6VUo",
      authDomain:        "il-trade.firebaseapp.com",
      databaseURL:       "https://il-trade-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "il-trade",
      storageBucket:     "il-trade.firebasestorage.app",
      messagingSenderId: "582308491669",
      appId:             "1:582308491669:web:a6d52ec80b7ff4a621869c"
    });
  } catch(e) { log('Init: '+e.message,'r'); return; }

  const auth = firebase.auth();
  const db   = firebase.database();

  // 2. Auth
  S(2,'wait','Авторизация...');
  let uid;
  try {
    const r = await Promise.race([
      auth.signInAnonymously(),
      new Promise((_,rej) => setTimeout(()=>rej(new Error('Таймаут 10с')),10000))
    ]);
    uid = r.user.uid;
    S(2,'ok','Auth OK · '+uid.slice(0,10)+'...');
    log('✅ uid: '+uid,'g');
  } catch(e) {
    S(2,'fail','Auth: '+e.message);
    log('❌ '+e.message,'r');
    log('👉 Authentication → Sign-in method → Anonymous → Enable','b');
    return;
  }

  // 3. Write — пропускаем .info/connected, сразу пишем
  S(3,'wait','Запись...');
  log('⏳ Пишем в /test/'+uid.slice(0,8)+'...');
  try {
    await Promise.race([
      db.ref('test/'+uid).set({ ts: Date.now(), test: true }),
      new Promise((_,rej) => setTimeout(()=>rej(new Error('Таймаут записи 10с')),10000))
    ]);
    S(3,'ok','Запись OK');
    log('✅ Запись прошла','g');
  } catch(e) {
    S(3,'fail','Запись: '+e.message);
    log('❌ '+e.message,'r');
    log('','');
    log('Возможные причины:','b');
    log('1. Rules: ".write": "auth != null" не сохранены','b');
    log('2. Realtime Database не создана','b');
    log('3. databaseURL неверный','b');
    log('','');
    log('Текущий databaseURL:','b');
    log('https://il-trade-default-rtdb.europe-west1.firebasedatabase.app','b');
    return;
  }

  // 4. Read
  S(4,'wait','Чтение...');
  try {
    const snap = await Promise.race([
      db.ref('test/'+uid).once('value'),
      new Promise((_,rej) => setTimeout(()=>rej(new Error('Таймаут чтения 10с')),10000))
    ]);
    await db.ref('test/'+uid).remove();
    if (snap.val()?.test) {
      S(4,'ok','Чтение OK');
      log('✅ Данные прочитаны и удалены','g');
    } else {
      throw new Error('Данные пустые');
    }
  } catch(e) {
    S(4,'fail','Чтение: '+e.message);
    log('❌ '+e.message,'r');
    return;
  }

  // 5. Done
  S(5,'ok','Всё работает! 🎉');
  log('','');
  log('🎉 Firebase полностью работает!','g');
  log('Загружай Index.html — должен запуститься.','g');

})();
</script>
</body>
</html>
