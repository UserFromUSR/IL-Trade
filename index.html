<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL Trade</title>
    <style>
        body {
            background-color: white;
            color: black;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin: 20px 0;
        }
        input[type="text"], input[type="submit"] {
            display: block;
            margin: 10px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: calc(100% - 20px);
            max-width: 400px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            font-size: 1em;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Welcome to IL Trade</h1>
    <div>
        <input type="text" placeholder="Enter something..." />
        <input type="submit" value="Save" />
    </div>
</body>
</html>
