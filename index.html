<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IL-Trade Journal PRO+</title>
<style>
body{background:#0b0f14;color:#e6edf3;font-family:Arial;padding:10px}
.live-calc{background:#0d1117;border:1px solid #238636;border-radius:8px;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lc-item{display:flex;flex-direction:column}
.lc-label{font-size:11px;color:#8b949e}
.lc-value{font-size:16px;font-weight:bold;color:#58a6ff}
</style>
</head>
<body>

<h2>IL Trading Journal (Updated)</h2>

<input id="deposit" placeholder="Deposit" oninput="liveCalc()">
<input id="leverage" placeholder="Leverage" oninput="liveCalc()">
<input id="riskPercent" placeholder="Risk %" oninput="liveCalc()">
<input id="entry" placeholder="Entry" oninput="liveCalc()">
<input id="stop" placeholder="Stop" oninput="liveCalc()">
<input id="tp1_price" placeholder="TP1" oninput="liveCalc()">

<select id="side" onchange="liveCalc()">
<option value="LONG">LONG</option>
<option value="SHORT">SHORT</option>
</select>

<div class="live-calc">
<div class="lc-item"><span class="lc-label">Position</span><span id="lc-pos" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">Base</span><span id="lc-pos-base" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">Leverage</span><span id="lc-lev" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">Risk</span><span id="lc-risk" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">Stop %</span><span id="lc-stop-pct" class="lc-value">—</span></div>

<div class="lc-item"><span class="lc-label">PnL TP1</span><span id="lc-pnl1" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">PnL Stop</span><span id="lc-pnl-stop" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">RR</span><span id="lc-rr" class="lc-value">—</span></div>
<div class="lc-item"><span class="lc-label">Exposure</span><span id="lc-exp" class="lc-value">—</span></div>
</div>

<script>
const val=id=>document.getElementById(id).value;
const fmt=(v,d=2)=>(+v||0).toFixed(d);
function set(id,v){document.getElementById(id).textContent=v;}

function liveCalc(){
const deposit=+val("deposit");
const lev=+val("leverage")||1;
const riskP=+val("riskPercent");
const entry=+val("entry");
const stop=+val("stop");
const tp1=+val("tp1_price");
const side=val("side");

if(!deposit||!entry||!stop){
["lc-pos","lc-pos-base","lc-lev","lc-risk","lc-stop-pct","lc-pnl1","lc-pnl-stop","lc-rr","lc-exp"]
.forEach(id=>set(id,"—"));
return;
}

const diff=Math.abs(entry-stop);
const stopPct=(diff/entry)*100;

const riskUSD=riskP?deposit*(riskP/100):(diff/entry)*deposit;

const posBase=diff?riskUSD/(diff/entry):0;
const pos=posBase*lev;

let pnl1=0;
if(tp1){
const size=pos/entry;
pnl1=side==="LONG"?(tp1-entry)*size:(entry-tp1)*size;
}

const pnlStop=-riskUSD;
const rr=diff?Math.abs(tp1-entry)/diff:0;

set("lc-pos","$"+fmt(pos,0));
set("lc-pos-base","$"+fmt(posBase,0));
set("lc-lev","x"+lev);
set("lc-risk","$"+fmt(riskUSD));
set("lc-stop-pct",fmt(stopPct,2)+"%");
set("lc-pnl1",tp1?"$"+fmt(pnl1):"—");
set("lc-pnl-stop","$"+fmt(pnlStop));
set("lc-rr",tp1?"1:"+fmt(rr,2):"—");
set("lc-exp","$"+fmt(pos,0));

const riskEl=document.getElementById("lc-risk");
riskEl.style.color=riskP>3?"#f85149":"#58a6ff";
}
</script>

</body>
</html>
