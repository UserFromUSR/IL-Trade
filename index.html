async function saveTrade() {
const side = document.querySelector('.side-btn.active')?.dataset.side;
const asset = document.getElementById('asset')?.value?.trim();
const entry = parseFloat(document.getElementById('entry')?.value);
const stop = parseFloat(document.getElementById('stop')?.value);
const tp1 = parseFloat(document.getElementById('tp1_price')?.value) || null;
const tp2 = parseFloat(document.getElementById('tp2_price')?.value) || null;
const deposit = parseFloat(document.getElementById('deposit')?.value) || state.settings.deposit;
const leverage = parseFloat(document.getElementById('leverage')?.value) || state.settings.leverage;
const riskPct = parseFloat(document.getElementById('riskPercent')?.value) || state.settings.riskPercent;

// Валидация
if (!asset || !entry || !stop) {
showNotification('Заполните обязательные поля', 'error');
return;
}

if (!side) {
showNotification('Выберите направление (LONG/SHORT)', 'error');
return;
}

// Расчёт размера позиции
const riskAmount = deposit * (riskPct / 100);
const stopDistance = Math.abs(entry - stop);
const positionSize = riskAmount / (stopDistance / entry * leverage);

const trade = {
id: Date.now().toString(),
date: new Date().toISOString().split('T')[0],
time: new Date().toTimeString().slice(0, 5),
side,
asset: asset.toUpperCase(),
deposit,
leverage,
riskPercent: riskPct,
positionSize,
entry,
stop,
tp1,
tp2,
status: 'open',
pnl: 0,
pnlPercent: 0
};

try {
const res = await fetch('/trade', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ uid: state.userId, trade })
});

if (res.ok) {
state.trades.push(trade);
renderJournal();
renderOpenTrades();
clearTradeForm();
showNotification('Сделка создана', 'success');

// Постинг в канал
if (state.channel?.autoPostOpen) {
postToChannel(trade, 'open');
}
} else {
showNotification('Ошибка сохранения', 'error');
}
} catch (err) {
showNotification('Ошибка сети', 'error');
}
}

function calculateOpenPnl(trade) {
// Симуляция текущей цены (для демо используем случайное значение)
const currentPrice = trade.entry (1 + (Math.random() - 0.5) 0.05);
const direction = trade.side === 'LONG' ? 1 : -1;
const priceDiff = (currentPrice - trade.entry) * direction;
return priceDiff * trade.positionSize;
}

async function closeTrade(tradeId, action) {
const trade = state.trades.find(t => t.id === tradeId);
if (!trade) return;

// Определяем результат
let pnl = 0;
let reason = action;

if (action === 'full') {
// Полное закрытие по текущей цене
pnl = calculateOpenPnl(trade);
} else if (action === 'tp') {
// Закрытие по TP
const tpPrice = trade.tp1 || trade.tp2;
const direction = trade.side === 'LONG' ? 1 : -1;
pnl = (tpPrice - trade.entry) direction trade.positionSize;
reason = 'take_profit';
} else if (action === 'stop') {
// Закрытие по стопу
const direction = trade.side === 'LONG' ? 1 : -1;
pnl = (trade.stop - trade.entry) direction trade.positionSize;
reason = 'stop_loss';
} else if (action === 'be') {
// Перевод в безубыток (частичное закрытие)
pnl = trade.deposit * 0.01; // 1% прибыли
} else if (action === 'partial') {
// Частичное закрытие 50%
pnl = calculateOpenPnl(trade) * 0.5;
}

const pnlPercent = (pnl / trade.deposit) * 100;

try {
const res = await fetch(/trade/${tradeId}/close, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ 
uid: state.userId, 
action,
pnl,
pnlPercent,
reason
})
});

if (res.ok) {
// Обновляем локально
trade.status = 'closed';
trade.pnl = pnl;
trade.pnlPercent = pnlPercent;
trade.closeReason = reason;
trade.closedAt = new Date().toISOString();

renderOpenTrades();
renderJournal();
renderStats();
closeModal();
showNotification(${trade.asset}: ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}, pnl >= 0 ? 'success' : 'error');

// Постинг в канал
if (state.channel?.autoPostClose) {
postToChannel(trade, 'close');
}
}
} catch (err) {
showNotification('Ошибка закрытия', 'error');
}
}

function calculateStats(period) {
const now = new Date();
let startDate;

switch (period) {

        function $(selector) {

        }

            return num?.toFixed(decimals) || '0.00';

        function formatCurrency(num) {
            return `$${formatNumber(num)}`;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function throttle(func, limit) {
            let inThrottle;
            return function(...args) {
                if (!inThrottle) {
                    func.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function truncate(str, maxLen) {
            if (!str) return '';
            return str.length > maxLen ? str.slice(0, maxLen) + '...' : str;
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'только что';
            if (seconds < 3600) return `${Math.floor(seconds / 60)} мин назад`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} ч назад`;
            return `${Math.floor(seconds / 86400)} дн назад`;
        }
