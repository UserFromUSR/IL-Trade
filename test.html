<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
<style>
body { background:#0b0f14; color:#e6edf3; font-family:Arial; padding:20px; font-size:15px; }
.row { padding:10px 0; border-bottom:1px solid #21262d; display:flex; gap:10px; align-items:center; }
.dot { width:12px; height:12px; border-radius:50%; background:#484f58; flex-shrink:0; }
.dot.ok  { background:#3fb950; }
.dot.err { background:#f85149; }
.dot.spin { background:#e3b341; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
#log { margin-top:20px; background:#161b22; border-radius:8px; padding:12px; font-size:13px; line-height:2; word-break:break-all; }
button { margin-top:16px; padding:10px 20px; background:#238636; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
</style>
</head>
<body>

<h2 style="margin-bottom:16px;">🔥 Firebase Диагностика</h2>

<div class="row"><div class="dot spin" id="d1"></div><span id="t1">Загрузка Firebase SDK...</span></div>
<div class="row"><div class="dot" id="d2"></div><span id="t2">Auth инициализация</span></div>
<div class="row"><div class="dot" id="d3"></div><span id="t3">signInAnonymously</span></div>
<div class="row"><div class="dot" id="d4"></div><span id="t4">Database connection</span></div>
<div class="row"><div class="dot" id="d5"></div><span id="t5">Read/Write test</span></div>

<div id="log"></div>
<button onclick="location.reload()">🔄 Повторить</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const log = msg => {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  console.log(msg);
};

const ok  = (n, msg) => { document.getElementById('d'+n).className='dot ok';  document.getElementById('t'+n).textContent = '✅ ' + msg; log('✅ ' + msg); };
const err = (n, msg) => { document.getElementById('d'+n).className='dot err'; document.getElementById('t'+n).textContent = '❌ ' + msg; log('❌ ' + msg); };
const run = (n, msg) => { document.getElementById('d'+n).className='dot spin'; document.getElementById('t'+n).textContent = '⏳ ' + msg; };

(async () => {
  // 1. SDK
  if (typeof firebase === 'undefined') { err(1,'Firebase SDK не загружен'); return; }
  ok(1, 'Firebase SDK загружен');

  // 2. Init
  run(2, 'Инициализация...');
  let auth, db;
  try {
    firebase.initializeApp({
      apiKey:            "AIzaSyBAZJPfxqE2JQ3ya_oDY50mUSIZwcx6VUo",
      authDomain:        "il-trade.firebaseapp.com",
      databaseURL:       "https://il-trade-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "il-trade",
      storageBucket:     "il-trade.firebasestorage.app",
      messagingSenderId: "582308491669",
      appId:             "1:582308491669:web:a6d52ec80b7ff4a621869c"
    });
    auth = firebase.auth();
    db   = firebase.database();
    ok(2, 'App инициализирован');
  } catch(e) { err(2, 'Init error: ' + e.message); return; }

  // 3. Auth
  run(3, 'signInAnonymously...');
  let uid;
  try {
    const result = await Promise.race([
      auth.signInAnonymously(),
      new Promise((_,r) => setTimeout(() => r(new Error('Таймаут 8с')), 8000))
    ]);
    uid = result.user?.uid || result.uid;
    ok(3, 'Auth OK · uid: ' + uid.slice(0,8) + '...');
  } catch(e) {
    err(3, 'Auth error: ' + e.message);
    log('💡 Скорее всего Anonymous Auth не включён в Firebase Console');
    log('   → Authentication → Sign-in method → Anonymous → Enable');
    return;
  }

  // 4. DB connection
  run(4, 'Подключение к БД...');
  try {
    const ref = db.ref('.info/connected');
    await new Promise((resolve, reject) => {
      const t = setTimeout(() => reject(new Error('Таймаут 5с')), 5000);
      ref.once('value', snap => {
        clearTimeout(t);
        if (snap.val() === true) resolve();
        else reject(new Error('connected = false'));
      }, e => { clearTimeout(t); reject(e); });
    });
    ok(4, 'Database connected');
  } catch(e) {
    err(4, 'DB error: ' + e.message);
    log('💡 Проверьте databaseURL и Firebase Rules');
    return;
  }

  // 5. Write/Read test
  run(5, 'Тест записи...');
  try {
    const testRef = db.ref('test/' + uid);
    await testRef.set({ ts: Date.now() });
    const snap = await testRef.once('value');
    await testRef.remove();
    if (snap.val()) {
      ok(5, 'Read/Write работает! ✨ Firebase настроен правильно');
      log('');
      log('🎉 Всё работает. Проблема в Index.html, не в Firebase.');
    } else {
      err(5, 'Данные не прочитались');
    }
  } catch(e) {
    err(5, 'Write error: ' + e.message);
    log('💡 Firebase Rules блокируют запись');
    log('   → Realtime Database → Rules → установите:');
    log('   { "rules": { ".read": "auth != null", ".write": "auth != null" } }');
  }
})();
</script>
</body>
</html>
